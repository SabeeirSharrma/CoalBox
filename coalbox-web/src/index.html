<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coalbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        .totp-bar { transition: width 1s linear; }
    </style>
</head>
<body class="h-full">
    <div id="app" class="h-full flex flex-col">

        <!-- Lock / Create Screen -->
        <div id="auth-screen" class="flex-1 flex items-center justify-center">
            <div class="w-full max-w-sm p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-amber-400">Coalbox</h1>
                    <p class="text-gray-500 mt-2 text-sm">Local-first password manager</p>
                </div>

                <!-- Unlock form -->
                <form id="unlock-form" class="space-y-4">
                    <p id="unlock-subtitle" class="text-center text-sm text-gray-400">Unlock your vault</p>
                    <input
                        type="password"
                        id="unlock-password"
                        placeholder="Master password"
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-amber-500 text-gray-100 placeholder-gray-500"
                        autofocus
                    >
                    <button
                        type="submit"
                        class="w-full py-3 bg-amber-600 hover:bg-amber-500 rounded-lg font-medium transition-colors"
                    >Unlock</button>
                    <p id="unlock-error" class="text-red-400 text-sm text-center hidden"></p>
                    <p class="text-center text-xs text-gray-600">No vault? <button type="button" id="show-create" class="text-amber-500 hover:underline">Create one</button></p>
                </form>

                <!-- Create vault form -->
                <form id="create-form" class="space-y-4 hidden">
                    <p class="text-center text-sm text-gray-400">Create a new vault</p>
                    <input
                        type="password"
                        id="create-password"
                        placeholder="Master password (min 8 chars)"
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-amber-500 text-gray-100 placeholder-gray-500"
                    >
                    <input
                        type="password"
                        id="create-confirm"
                        placeholder="Confirm password"
                        class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg focus:outline-none focus:border-amber-500 text-gray-100 placeholder-gray-500"
                    >
                    <button
                        type="submit"
                        class="w-full py-3 bg-amber-600 hover:bg-amber-500 rounded-lg font-medium transition-colors"
                    >Create Vault</button>
                    <p id="create-error" class="text-red-400 text-sm text-center hidden"></p>
                    <p class="text-center text-xs text-gray-600">Have a vault? <button type="button" id="show-unlock" class="text-amber-500 hover:underline">Unlock it</button></p>
                </form>
            </div>
        </div>

        <!-- Main UI -->
        <div id="main-ui" class="flex-1 flex flex-col hidden">

            <!-- Header -->
            <header class="flex items-center justify-between px-4 py-2 border-b border-gray-800 shrink-0">
                <h1 class="text-lg font-bold text-amber-400">Coalbox</h1>
                <div class="flex items-center gap-2">
                    <span id="entry-count" class="text-xs text-gray-500"></span>
                    <button id="btn-import" class="text-xs px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded" title="Import">Import</button>
                    <button id="btn-export" class="text-xs px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded" title="Export">Export</button>
                    <button id="btn-info" class="text-xs px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded" title="Vault info">Info</button>
                    <button id="btn-lock" class="text-xs px-2 py-1 bg-gray-800 hover:bg-gray-700 rounded text-red-400" title="Lock vault">Lock</button>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden">

                <!-- Sidebar -->
                <aside class="w-72 border-r border-gray-800 flex flex-col shrink-0">
                    <!-- Search -->
                    <div class="p-2 border-b border-gray-800">
                        <div class="relative">
                            <input type="text" id="search-input" placeholder="Search... (Ctrl+K)" class="w-full px-3 py-1.5 bg-gray-900 border border-gray-700 rounded text-sm focus:outline-none focus:border-amber-500 pr-8">
                            <span class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-600 text-xs">⌘K</span>
                        </div>
                    </div>

                    <!-- Filter tabs -->
                    <div class="flex border-b border-gray-800 text-xs">
                        <button class="filter-tab flex-1 py-1.5 text-amber-400 border-b-2 border-amber-400" data-filter="all">All</button>
                        <button class="filter-tab flex-1 py-1.5 text-gray-500 hover:text-gray-300" data-filter="favourites">★ Favs</button>
                        <button class="filter-tab flex-1 py-1.5 text-gray-500 hover:text-gray-300" data-filter="logins">Keys</button>
                        <button class="filter-tab flex-1 py-1.5 text-gray-500 hover:text-gray-300" data-filter="notes">Notes</button>
                    </div>

                    <!-- Tags -->
                    <div id="tags-bar" class="flex gap-1 px-2 py-1.5 border-b border-gray-800 overflow-x-auto hidden"></div>

                    <!-- Entry list -->
                    <div id="entry-list" class="flex-1 overflow-y-auto p-1.5 space-y-0.5"></div>

                    <!-- Add button -->
                    <div class="p-2 border-t border-gray-800">
                        <button id="btn-add" class="w-full py-1.5 bg-amber-600 hover:bg-amber-500 rounded text-sm font-medium">+ New Entry <span class="text-xs opacity-60 ml-1">Ctrl+N</span></button>
                    </div>
                </aside>

                <!-- Content -->
                <main class="flex-1 overflow-y-auto p-6" id="content-area">
                    <div class="text-center text-gray-500 mt-20">
                        <p class="text-4xl mb-4">🔒</p>
                        <p class="text-lg">Select an entry</p>
                        <p class="text-sm mt-1">or press <kbd class="px-1.5 py-0.5 bg-gray-800 rounded text-xs">Ctrl+N</kbd> to create one</p>
                    </div>
                </main>
            </div>
        </div>

        <!-- Modal: Generate -->
        <div id="modal-generate" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
            <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-md p-6 relative">
                <h2 class="text-lg font-bold mb-4">Password Generator</h2>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <button id="gen-type-password" class="flex-1 py-1.5 bg-amber-600 rounded text-sm">Password</button>
                        <button id="gen-type-passphrase" class="flex-1 py-1.5 bg-gray-800 rounded text-sm">Passphrase</button>
                    </div>
                    <div id="gen-password-opts" class="space-y-2">
                        <label class="flex items-center gap-2 text-sm">
                            <span class="w-16">Length:</span>
                            <input type="number" id="gen-length" value="20" min="8" max="128" class="w-20 px-2 py-1 bg-gray-800 border border-gray-700 rounded text-sm">
                        </label>
                    </div>
                    <div id="gen-passphrase-opts" class="space-y-2 hidden">
                        <label class="flex items-center gap-2 text-sm">
                            <span class="w-16">Words:</span>
                            <input type="number" id="gen-words" value="6" min="3" max="12" class="w-20 px-2 py-1 bg-gray-800 border border-gray-700 rounded text-sm">
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <span class="w-16">Separator:</span>
                            <input type="text" id="gen-separator" value=" " class="w-20 px-2 py-1 bg-gray-800 border border-gray-700 rounded text-sm">
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" id="gen-capitalize" checked> Capitalize
                        </label>
                        <label class="flex items-center gap-2 text-sm">
                            <input type="checkbox" id="gen-number"> Add number
                        </label>
                    </div>
                    <div class="bg-gray-800 p-3 rounded font-mono text-sm break-all select-all" id="gen-result">—</div>
                    <div class="flex gap-2">
                        <button id="gen-refresh" class="flex-1 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm">Regenerate</button>
                        <button id="gen-copy" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm">Copy</button>
                        <button id="gen-use" class="flex-1 py-2 bg-amber-600 hover:bg-amber-500 rounded text-sm hidden">Use</button>
                    </div>
                </div>
                <button id="gen-close" class="absolute top-3 right-3 text-gray-500 hover:text-gray-300 text-xl">&times;</button>
            </div>
        </div>

        <!-- Modal: Add/Edit Entry -->
        <div id="modal-entry" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
            <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-lg p-6 relative">
                <h2 id="modal-entry-title" class="text-lg font-bold mb-4">New Entry</h2>
                <form id="entry-form" class="space-y-3">
                    <input type="hidden" id="entry-id">
                    <select id="entry-type" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm">
                        <option value="login">Login</option>
                        <option value="note">Secure Note</option>
                    </select>
                    <input type="text" id="entry-title" placeholder="Title" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm" required>
                    <div id="login-fields">
                        <input type="text" id="entry-username" placeholder="Username" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm mb-2">
                        <div class="flex gap-1 mb-2">
                            <input type="text" id="entry-password" placeholder="Password" class="flex-1 px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm">
                            <button type="button" id="entry-gen-pw" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm" title="Generate password">🎲</button>
                            <button type="button" id="entry-copy-pw" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm" title="Copy password">📋</button>
                        </div>
                        <input type="text" id="entry-url" placeholder="URL" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm mb-2">
                        <input type="text" id="entry-totp" placeholder="TOTP secret (base32)" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm mb-2">
                    </div>
                    <textarea id="entry-notes" placeholder="Notes" rows="3" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm"></textarea>
                    <div class="flex gap-2 pt-1">
                        <button type="submit" class="flex-1 py-2 bg-amber-600 hover:bg-amber-500 rounded text-sm font-medium">Save</button>
                        <button type="button" id="entry-cancel" class="flex-1 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm">Cancel</button>
                    </div>
                </form>
                <button id="entry-modal-close" class="absolute top-3 right-3 text-gray-500 hover:text-gray-300 text-xl">&times;</button>
            </div>
        </div>

        <!-- Modal: Vault Info -->
        <div id="modal-info" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
            <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-sm p-6 relative">
                <h2 class="text-lg font-bold mb-4">Vault Info</h2>
                <div id="info-content" class="space-y-2 text-sm"></div>
                <button onclick="hideModal('modal-info')" class="absolute top-3 right-3 text-gray-500 hover:text-gray-300 text-xl">&times;</button>
            </div>
        </div>

        <!-- Modal: Import -->
        <div id="modal-import" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
            <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-md p-6 relative">
                <h2 class="text-lg font-bold mb-4">Import Entries</h2>
                <div class="space-y-3">
                    <input type="file" id="import-file" accept=".csv,.json,.xml,.1pux" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:bg-amber-600 file:text-white hover:file:bg-amber-500">
                    <select id="import-format" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded text-sm">
                        <option value="auto">Auto-detect</option>
                        <option value="csv">CSV</option>
                        <option value="bitwarden">Bitwarden JSON</option>
                        <option value="keepass">KeePass XML</option>
                        <option value="1password">1Password 1PUX</option>
                    </select>
                    <div id="import-result" class="text-sm hidden"></div>
                    <button id="import-submit" class="w-full py-2 bg-amber-600 hover:bg-amber-500 rounded text-sm font-medium">Import</button>
                </div>
                <button onclick="hideModal('modal-import')" class="absolute top-3 right-3 text-gray-500 hover:text-gray-300 text-xl">&times;</button>
            </div>
        </div>
    </div>

    <script>
    // ── State ──────────────────────────────────────────────────────
    let entries = [];
    let selectedId = null;
    let activeFilter = 'all';
    let activeTag = null;
    let ws = null;
    let genType = 'password';
    let genTargetField = null;
    let totpInterval = null;
    let clipboardTimer = null;

    // ── API ────────────────────────────────────────────────────────
    const api = {
        async get(u) { return (await fetch(u)).json(); },
        async post(u, b) { return (await fetch(u, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) })).json(); },
        async put(u, b) { return (await fetch(u, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) })).json(); },
        async del(u) { return (await fetch(u, { method: 'DELETE' })).json(); }
    };

    // ── Clipboard with auto-clear ──────────────────────────────────
    async function copyText(text, autoClear = true) {
        await navigator.clipboard.writeText(text);
        if (autoClear) {
            clearTimeout(clipboardTimer);
            clipboardTimer = setTimeout(() => navigator.clipboard.writeText(''), 30000);
        }
    }

    // ── WebSocket ──────────────────────────────────────────────────
    function connectWs() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.onmessage = (e) => {
            if (e.data === 'unlock') { loadEntries(); showMain(); }
            else if (e.data === 'lock') { showAuth(); }
            else if (e.data === 'entries_changed') { loadEntries(); }
        };
        ws.onclose = () => setTimeout(connectWs, 2000);
    }

    // ── UI state ───────────────────────────────────────────────────
    function showAuth() {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('auth-screen').classList.add('flex');
        document.getElementById('main-ui').classList.add('hidden');
        document.getElementById('unlock-password').value = '';
        document.getElementById('unlock-error').classList.add('hidden');
        document.getElementById('create-form').classList.add('hidden');
        document.getElementById('unlock-form').classList.remove('hidden');
        entries = []; selectedId = null;
        renderList();
        clearInterval(totpInterval);
    }

    function showMain() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('flex');
        document.getElementById('main-ui').classList.remove('hidden');
    }

    // ── Modals ─────────────────────────────────────────────────────
    function showModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
    window.hideModal = function(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); };

    // ── Entries ────────────────────────────────────────────────────
    async function loadEntries() {
        const res = await api.get('/api/entries');
        if (res.ok) {
            entries = res.data;
            document.getElementById('entry-count').textContent = `${entries.length} entries`;
            renderTags();
            renderList();
        }
    }

    function renderTags() {
        const tagMap = {};
        entries.forEach(e => (e.tags || []).forEach(t => { tagMap[t] = (tagMap[t] || 0) + 1; }));
        const bar = document.getElementById('tags-bar');
        const tags = Object.entries(tagMap).sort((a, b) => b[1] - a[1]);
        if (tags.length === 0) { bar.classList.add('hidden'); return; }
        bar.classList.remove('hidden');
        bar.innerHTML = tags.map(([t, c]) =>
            `<button class="tag-btn shrink-0 px-2 py-0.5 rounded text-xs ${activeTag === t ? 'bg-amber-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}" data-tag="${esc(t)}">${esc(t)} <span class="opacity-60">${c}</span></button>`
        ).join('') + `<button class="tag-btn shrink-0 px-2 py-0.5 rounded text-xs ${activeTag === null ? 'bg-amber-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}" data-tag="">all</button>`;
        bar.querySelectorAll('.tag-btn').forEach(b => b.onclick = () => { activeTag = b.dataset.tag || null; renderList(); renderTags(); });
    }

    function renderList(filter = '') {
        const list = document.getElementById('entry-list');
        const q = filter.toLowerCase();
        let filtered = entries.filter(e => {
            if (q && !e.title.toLowerCase().includes(q) && !(e.username || '').toLowerCase().includes(q) && !(e.url || '').toLowerCase().includes(q)) return false;
            if (activeFilter === 'favourites' && !e.favourite) return false;
            if (activeFilter === 'logins' && e.entry_type !== 'login') return false;
            if (activeFilter === 'notes' && e.entry_type !== 'note') return false;
            if (activeTag && !(e.tags || []).includes(activeTag)) return false;
            return true;
        });

        if (filtered.length === 0 && entries.length > 0) {
            list.innerHTML = '<div class="text-center text-gray-600 text-sm mt-8">No entries match</div>';
        } else if (entries.length === 0) {
            list.innerHTML = '<div class="text-center text-gray-600 text-sm mt-8">No entries yet.<br>Press <kbd class="px-1 py-0.5 bg-gray-800 rounded text-xs">Ctrl+N</kbd></div>';
        } else {
            list.innerHTML = filtered.map(e => {
                const icons = { login: '🔑', note: '📝', card: '💳', identity: '👤' };
                const icon = icons[e.entry_type] || '🔑';
                const sel = e.id === selectedId ? 'bg-gray-800 border-amber-600' : 'border-transparent hover:border-gray-700';
                const fav = e.favourite ? '<span class="text-amber-400 text-xs ml-auto shrink-0">★</span>' : '';
                return `<div class="entry-item flex items-center gap-2 px-2 py-1.5 rounded border cursor-pointer ${sel} group" data-id="${e.id}">
                    <span class="text-sm shrink-0">${icon}</span>
                    <span class="text-sm truncate flex-1">${esc(e.title)}</span>
                    ${fav}
                </div>`;
            }).join('');
            list.querySelectorAll('.entry-item').forEach(el => el.onclick = () => selectEntry(el.dataset.id));
        }
    }

    async function selectEntry(id) {
        selectedId = id;
        renderList(document.getElementById('search-input').value);
        const res = await api.get(`/api/entries/${id}`);
        if (!res.ok) return;
        const e = res.data;
        const area = document.getElementById('content-area');
        const typeLabel = { login: 'Login', note: 'Secure Note', card: 'Payment Card', identity: 'Identity' }[e.entry_type] || 'Entry';
        const favBtn = e.favourite
            ? `<button onclick="toggleFav('${e.id}')" class="text-amber-400 text-lg" title="Remove from favourites">★</button>`
            : `<button onclick="toggleFav('${e.id}')" class="text-gray-600 hover:text-amber-400 text-lg" title="Add to favourites">☆</button>`;

        let html = `<div class="max-w-2xl">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    ${favBtn}
                    <div>
                        <h2 class="text-xl font-bold">${esc(e.title)}</h2>
                        <span class="text-xs text-gray-500">${typeLabel}${(e.tags||[]).length ? ' · ' + e.tags.join(', ') : ''}</span>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="editEntry('${e.id}')" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded text-sm">Edit</button>
                    <button onclick="deleteEntry('${e.id}')" class="px-3 py-1 bg-gray-800 hover:bg-red-900 rounded text-sm text-red-400">Delete</button>
                </div>
            </div>`;

        if (e.username) html += fieldRow('Username', e.username, `<span class="text-sm">${esc(e.username)}</span>`, e.username);
        if (e.password) html += fieldRow('Password', 'Password', `<span class="text-sm font-mono">${'•'.repeat(Math.min(e.password.length, 20))}</span>`, e.password);
        if (e.url) html += fieldRow('URL', 'URL', `<a href="${esc(e.url)}" target="_blank" class="text-amber-400 hover:underline text-sm">${esc(e.url)}</a>`, e.url);
        if (e.notes) html += `<div class="mb-3"><div class="text-xs text-gray-500 mb-1">Notes</div><div class="text-sm bg-gray-900 p-3 rounded whitespace-pre-wrap">${esc(e.notes)}</div></div>`;

        if (e.totp_secret) {
            html += `<div class="mb-3">
                <div class="text-xs text-gray-500 mb-1">TOTP</div>
                <div class="flex items-center gap-3 bg-gray-900 p-3 rounded">
                    <span id="totp-code" class="text-2xl font-mono text-amber-400 tracking-widest">------</span>
                    <div class="flex-1">
                        <div class="h-1.5 bg-gray-800 rounded-full overflow-hidden"><div id="totp-bar" class="h-full bg-amber-500 totp-bar" style="width:100%"></div></div>
                        <span id="totp-remaining" class="text-xs text-gray-500 mt-0.5 block"></span>
                    </div>
                    <button onclick="refreshTotp('${e.id}')" class="text-sm px-2 py-1 bg-gray-800 rounded">↻</button>
                </div>
            </div>`;
            startTotpTimer(e.id);
        }

        html += `<div class="text-xs text-gray-600 mt-6">
            Created: ${fmtDate(e.created)} · Modified: ${fmtDate(e.modified)}
        </div></div>`;
        area.innerHTML = html;
    }

    function fieldRow(label, tooltip, display, copyVal) {
        return `<div class="mb-3 flex items-center justify-between bg-gray-900 p-3 rounded group">
            <div class="min-w-0"><div class="text-xs text-gray-500 mb-0.5">${label}</div>${display}</div>
            ${copyVal ? `<button onclick="copyText('${esc(copyVal).replace(/'/g, "\\'")}')" class="text-xs px-2 py-1 bg-gray-800 rounded hover:bg-gray-700 opacity-0 group-hover:opacity-100 transition-opacity shrink-0 ml-2">Copy</button>` : ''}
        </div>`;
    }

    async function toggleFav(id) {
        const res = await api.post(`/api/entries/${id}/favourite`);
        if (res.ok) { await loadEntries(); selectEntry(id); }
    }
    window.toggleFav = toggleFav;

    async function refreshTotp(id) {
        const res = await api.get(`/api/entries/${id}/totp`);
        if (res.ok) {
            document.getElementById('totp-code').textContent = res.data.code;
            const remaining = parseInt(res.data.remaining);
            document.getElementById('totp-remaining').textContent = `${remaining}s`;
            document.getElementById('totp-bar').style.width = `${(remaining / 30) * 100}%`;
        }
    }

    function startTotpTimer(id) {
        clearInterval(totpInterval);
        let remaining = 30;
        refreshTotp(id);
        totpInterval = setInterval(() => {
            remaining--;
            if (remaining <= 0) { remaining = 30; refreshTotp(id); }
            const bar = document.getElementById('totp-bar');
            const rem = document.getElementById('totp-remaining');
            if (bar) bar.style.width = `${(remaining / 30) * 100}%`;
            if (rem) rem.textContent = `${remaining}s`;
        }, 1000);
    }

    // ── Helpers ────────────────────────────────────────────────────
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtDate(s) { return new Date(s).toLocaleString(); }

    // ── Entry CRUD ─────────────────────────────────────────────────
    window.editEntry = async (id) => {
        const res = await api.get(`/api/entries/${id}`);
        if (!res.ok) return;
        const e = res.data;
        document.getElementById('modal-entry-title').textContent = 'Edit Entry';
        document.getElementById('entry-id').value = e.id;
        document.getElementById('entry-type').value = e.entry_type;
        document.getElementById('entry-title').value = e.title;
        document.getElementById('entry-username').value = e.username || '';
        document.getElementById('entry-password').value = e.password || '';
        document.getElementById('entry-url').value = e.url || '';
        document.getElementById('entry-totp').value = e.totp_secret || '';
        document.getElementById('entry-notes').value = e.notes || '';
        updateEntryTypeFields();
        showModal('modal-entry');
    };

    window.deleteEntry = async (id) => {
        if (!confirm('Delete this entry?')) return;
        await api.del(`/api/entries/${id}`);
        selectedId = null;
        document.getElementById('content-area').innerHTML = '<div class="text-center text-gray-500 mt-20"><p class="text-4xl mb-4">🔒</p><p>Select an entry</p></div>';
        await loadEntries();
    };

    function updateEntryTypeFields() {
        document.getElementById('login-fields').classList.toggle('hidden', document.getElementById('entry-type').value === 'note');
    }

    // ── Init ───────────────────────────────────────────────────────
    // Auth forms
    document.getElementById('unlock-form').onsubmit = async (e) => {
        e.preventDefault();
        const pw = document.getElementById('unlock-password').value;
        const err = document.getElementById('unlock-error');
        const res = await api.post('/api/unlock', { password: pw });
        if (res.ok) { showMain(); await loadEntries(); }
        else { err.textContent = res.error || 'Failed to unlock'; err.classList.remove('hidden'); }
    };

    document.getElementById('create-form').onsubmit = async (e) => {
        e.preventDefault();
        const pw = document.getElementById('create-password').value;
        const confirm = document.getElementById('create-confirm').value;
        const err = document.getElementById('create-error');
        err.classList.add('hidden');
        if (pw.length < 8) { err.textContent = 'Password must be at least 8 characters'; err.classList.remove('hidden'); return; }
        if (pw !== confirm) { err.textContent = 'Passwords do not match'; err.classList.remove('hidden'); return; }
        const res = await api.post('/api/vault', { password: pw });
        if (res.ok) { showMain(); await loadEntries(); }
        else { err.textContent = res.error || 'Failed to create vault'; err.classList.remove('hidden'); }
    };

    document.getElementById('show-create').onclick = () => {
        document.getElementById('unlock-form').classList.add('hidden');
        document.getElementById('create-form').classList.remove('hidden');
        document.getElementById('create-password').focus();
    };
    document.getElementById('show-unlock').onclick = () => {
        document.getElementById('create-form').classList.add('hidden');
        document.getElementById('unlock-form').classList.remove('hidden');
        document.getElementById('unlock-password').focus();
    };

    // Header buttons
    document.getElementById('btn-lock').onclick = async () => { await api.post('/api/lock'); showAuth(); };
    document.getElementById('btn-import').onclick = () => showModal('modal-import');
    document.getElementById('btn-export').onclick = async () => {
        const res = await api.get('/api/entries');
        if (!res.ok) return;
        const blob = new Blob([JSON.stringify(res.data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'coalbox-export.json'; a.click();
    };
    document.getElementById('btn-info').onclick = async () => {
        const res = await api.get('/api/status');
        if (!res.ok) return;
        const d = res.data;
        document.getElementById('info-content').innerHTML = `
            <div class="flex justify-between"><span class="text-gray-500">Path</span><span class="font-mono text-xs">${esc(d.vault_path)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Entries</span><span>${d.entry_count}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Format</span><span>.emberkeys (EMBK v1)</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Cipher</span><span>AES-256-GCM</span></div>
            <div class="flex justify-between"><span class="text-gray-500">KDF</span><span>Argon2id (64MB)</span></div>`;
        showModal('modal-info');
    };

    // Search
    document.getElementById('search-input').oninput = (e) => renderList(e.target.value);

    // Filter tabs
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.filter-tab').forEach(t => { t.className = 'filter-tab flex-1 py-1.5 text-gray-500 hover:text-gray-300'; });
            tab.className = 'filter-tab flex-1 py-1.5 text-amber-400 border-b-2 border-amber-400';
            activeFilter = tab.dataset.filter;
            activeTag = null;
            renderList(document.getElementById('search-input').value);
            renderTags();
        };
    });

    // Add entry
    document.getElementById('btn-add').onclick = () => {
        document.getElementById('modal-entry-title').textContent = 'New Entry';
        document.getElementById('entry-id').value = '';
        document.getElementById('entry-form').reset();
        document.getElementById('entry-type').value = 'login';
        updateEntryTypeFields();
        showModal('modal-entry');
        document.getElementById('entry-title').focus();
    };
    document.getElementById('entry-type').onchange = updateEntryTypeFields;
    document.getElementById('entry-cancel').onclick = () => hideModal('modal-entry');
    document.getElementById('entry-modal-close').onclick = () => hideModal('modal-entry');

    // Entry form submit
    document.getElementById('entry-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('entry-id').value;
        const body = {
            title: document.getElementById('entry-title').value,
            username: document.getElementById('entry-username').value,
            password: document.getElementById('entry-password').value,
            url: document.getElementById('entry-url').value,
            notes: document.getElementById('entry-notes').value,
            totp_secret: document.getElementById('entry-totp').value,
            entry_type: document.getElementById('entry-type').value,
        };
        if (id) await api.put(`/api/entries/${id}`, body);
        else await api.post('/api/entries', body);
        hideModal('modal-entry');
        await loadEntries();
        if (id) selectEntry(id);
    };

    // Generate password button in entry form → opens generator targeting password field
    document.getElementById('entry-gen-pw').onclick = () => { genTargetField = 'entry-password'; openGenerator(); };
    document.getElementById('entry-copy-pw').onclick = () => { copyText(document.getElementById('entry-password').value); };

    // Generator
    function openGenerator() {
        genType = 'password';
        updateGenType();
        generatePassword();
        const useBtn = document.getElementById('gen-use');
        if (genTargetField) { useBtn.classList.remove('hidden'); useBtn.textContent = 'Use'; }
        else { useBtn.classList.add('hidden'); }
        showModal('modal-generate');
    }
    document.getElementById('btn-generate')?.onclick = openGenerator;

    document.getElementById('gen-type-password').onclick = () => { genType = 'password'; updateGenType(); generatePassword(); };
    document.getElementById('gen-type-passphrase').onclick = () => { genType = 'passphrase'; updateGenType(); generatePassword(); };
    document.getElementById('gen-refresh').onclick = generatePassword;
    document.getElementById('gen-close').onclick = () => { genTargetField = null; hideModal('modal-generate'); };
    document.getElementById('gen-copy').onclick = () => { const t = document.getElementById('gen-result').textContent; if (t !== '—') copyText(t); };
    document.getElementById('gen-use').onclick = () => {
        const val = document.getElementById('gen-result').textContent;
        if (genTargetField && val !== '—') {
            document.getElementById(genTargetField).value = val;
            genTargetField = null;
            hideModal('modal-generate');
        }
    };

    function updateGenType() {
        document.getElementById('gen-type-password').className = `flex-1 py-1.5 rounded text-sm ${genType === 'password' ? 'bg-amber-600' : 'bg-gray-800'}`;
        document.getElementById('gen-type-passphrase').className = `flex-1 py-1.5 rounded text-sm ${genType === 'passphrase' ? 'bg-amber-600' : 'bg-gray-800'}`;
        document.getElementById('gen-password-opts').classList.toggle('hidden', genType !== 'password');
        document.getElementById('gen-passphrase-opts').classList.toggle('hidden', genType !== 'passphrase');
    }

    async function generatePassword() {
        const body = genType === 'passphrase'
            ? { passphrase: true, words: +document.getElementById('gen-words').value, separator: document.getElementById('gen-separator').value, capitalize: document.getElementById('gen-capitalize').checked, number: document.getElementById('gen-number').checked }
            : { passphrase: false, length: +document.getElementById('gen-length').value };
        const res = await api.post('/api/generate', body);
        if (res.ok) document.getElementById('gen-result').textContent = res.data.password;
    }

    // Import
    document.getElementById('import-submit').onclick = async () => {
        const fileInput = document.getElementById('import-file');
        const format = document.getElementById('import-format').value;
        const resultEl = document.getElementById('import-result');
        if (!fileInput.files.length) { resultEl.textContent = 'Select a file first'; resultEl.classList.remove('hidden'); return; }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('format', format);

        // For now, we use JSON upload since we don't have multipart
        // Read file as text and send as JSON
        const text = await fileInput.files[0].text();
        const res = await fetch('/api/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: text, format: format, filename: fileInput.files[0].name })
        });
        const data = await res.json();
        if (data.ok) {
            resultEl.innerHTML = `<span class="text-green-400">✓ Imported ${data.data?.imported || 0} entries</span>`;
            resultEl.classList.remove('hidden');
            await loadEntries();
        } else {
            resultEl.innerHTML = `<span class="text-red-400">✗ ${data.error}</span>`;
            resultEl.classList.remove('hidden');
        }
    };

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        // Ctrl+K → focus search
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            document.getElementById('search-input').focus();
        }
        // Ctrl+N → new entry
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
            e.preventDefault();
            document.getElementById('btn-add').click();
        }
        // Escape → close modals
        if (e.key === 'Escape') {
            ['modal-generate', 'modal-entry', 'modal-info', 'modal-import'].forEach(id => {
                const m = document.getElementById(id);
                if (!m.classList.contains('hidden')) { hideModal(id); genTargetField = null; }
            });
        }
    });

    // Check vault status on load
    (async () => {
        const res = await api.get('/api/status');
        if (res.ok) {
            if (!res.data.vault_exists) {
                document.getElementById('unlock-form').classList.add('hidden');
                document.getElementById('create-form').classList.remove('hidden');
                document.getElementById('create-password').focus();
            }
        }
        connectWs();
    })();
    </script>
</body>
</html>
