<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coalbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        @keyframes totp-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .totp-urgent { animation: totp-pulse 0.5s ease-in-out infinite; }
        .totp-ring { transform: rotate(-90deg); }
        .totp-ring circle.progress {
            transition: stroke-dashoffset 1s linear;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4b5563;
        }
        /* Toast animation */
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-leave { animation: slideOutRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="h-full font-sans antialiased text-gray-300">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <div id="app" class="h-full flex flex-col">

        <!-- Lock Screen -->
        <div id="lock-screen" class="flex-1 flex items-center justify-center relative overflow-hidden">
            <!-- Background glow -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-600/10 blur-[100px] rounded-full pointer-events-none"></div>
            
            <div class="w-full max-w-md p-8 bg-gray-900/80 backdrop-blur-xl border border-gray-800 rounded-3xl shadow-2xl relative z-10">
                <div class="text-center mb-8 flex flex-col items-center">
                    <div class="w-16 h-16 bg-gradient-to-br from-amber-500/20 to-amber-600/5 text-amber-500 rounded-2xl flex items-center justify-center mb-5 border border-amber-500/20 shadow-inner">
                        <i data-lucide="shield-check" class="w-8 h-8"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-50 tracking-tight">Coalbox</h1>
                    <p class="text-gray-400 mt-2 text-sm font-medium">Local-first password manager</p>
                </div>
                <form id="unlock-form" class="space-y-5">
                    <div class="relative group">
                        <i data-lucide="key" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500 group-focus-within:text-amber-500 transition-colors"></i>
                        <input
                            type="password"
                            id="unlock-password"
                            placeholder="Master password"
                            class="w-full pl-12 pr-4 py-3.5 bg-gray-950 border border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 text-gray-100 placeholder-gray-500 transition-all font-medium"
                            autofocus
                        >
                    </div>
                    <button
                        type="submit"
                        class="w-full py-3.5 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 rounded-xl font-semibold transition-all flex items-center justify-center gap-2 text-gray-50 shadow-lg shadow-amber-600/20 hover:shadow-amber-500/30 outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2 focus:ring-offset-gray-900"
                    >
                        <i data-lucide="unlock" class="w-5 h-5"></i>
                        Unlock Vault
                    </button>
                    <p id="unlock-error" class="text-red-400 text-sm text-center hidden font-medium bg-red-500/10 py-2 rounded-lg"></p>
                </form>
            </div>
        </div>

        <!-- Main UI -->
        <div id="main-ui" class="flex-1 flex flex-col hidden">

            <!-- Header -->
            <header class="flex items-center justify-between px-6 py-4 border-b border-gray-800 bg-gray-900/80 backdrop-blur-md z-10 sticky top-0">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-amber-500/20 to-amber-600/5 text-amber-500 rounded-xl flex items-center justify-center border border-amber-500/20">
                        <i data-lucide="shield" class="w-5 h-5"></i>
                    </div>
                    <h1 class="text-xl font-bold text-gray-50 tracking-tight">Coalbox</h1>
                    <span id="entry-count" class="text-xs font-semibold text-gray-400 bg-gray-800 px-2.5 py-1 rounded-full ml-1 border border-gray-700"></span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-generate" class="flex items-center gap-2 text-sm px-4 py-2 bg-gray-800 hover:bg-gray-700 focus:ring-2 focus:ring-gray-600 rounded-lg transition-all font-medium text-gray-200 outline-none border border-gray-700">
                        <i data-lucide="zap" class="w-4 h-4 text-amber-500"></i> Generate
                    </button>
                    <button id="btn-import" class="flex items-center gap-2 text-sm px-4 py-2 bg-gray-800 hover:bg-gray-700 focus:ring-2 focus:ring-gray-600 rounded-lg transition-all font-medium text-gray-200 outline-none border border-gray-700">
                        <i data-lucide="import" class="w-4 h-4 text-gray-400"></i> Import
                    </button>
                    <div class="w-px h-6 bg-gray-800 mx-1"></div>
                    <button id="btn-lock" class="flex items-center gap-2 text-sm px-4 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 hover:text-red-300 focus:ring-2 focus:ring-red-500/50 rounded-lg transition-all font-medium outline-none border border-red-500/20">
                        <i data-lucide="lock" class="w-4 h-4"></i> Lock
                    </button>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden bg-gray-950">

                <!-- Sidebar -->
                <aside class="w-[320px] border-r border-gray-800 flex flex-col bg-gray-900/30">
                    <div class="flex border-b border-gray-800 p-2 gap-1 bg-gray-900/50">
                        <button id="tab-vault" class="flex-1 py-1.5 px-3 rounded-lg text-sm font-medium bg-gray-800 text-gray-200 transition-all">Vault</button>
                        <button id="tab-authenticator" class="flex-1 py-1.5 px-3 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-gray-800/50 transition-all">Authenticator</button>
                    </div>
                    <div class="p-4 border-b border-gray-800">
                        <div class="relative group">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 group-focus-within:text-amber-500 transition-colors"></i>
                            <input
                                type="text"
                                id="search-input"
                                placeholder="Search vault..."
                                class="w-full pl-9 pr-4 py-2.5 bg-gray-950 border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all placeholder-gray-500 font-medium"
                            >
                        </div>
                    </div>
                    <div id="entry-list" class="flex-1 overflow-y-auto p-3 space-y-1.5"></div>
                    <div class="p-4 border-t border-gray-800 bg-gray-900/50 backdrop-blur-sm">
                        <button id="btn-add" class="w-full py-2.5 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 rounded-lg text-sm font-semibold transition-all flex items-center justify-center gap-2 text-gray-50 shadow-md shadow-amber-600/10 focus:ring-2 focus:ring-amber-500/50 focus:outline-none">
                            <i data-lucide="plus" class="w-4 h-4"></i> New Entry
                        </button>
                    </div>
                </aside>

                <!-- Content -->
                <main class="flex-1 overflow-y-auto p-8 relative" id="content-area">
                    <div class="h-full flex flex-col items-center justify-center text-gray-500 space-y-4 select-none">
                        <div class="w-20 h-20 bg-gray-900/50 rounded-3xl flex items-center justify-center border border-gray-800 shadow-inner">
                            <i data-lucide="box" class="w-10 h-10 text-gray-700"></i>
                        </div>
                        <p class="font-medium text-gray-500 text-sm">Select an entry or create a new one</p>
                    </div>
                </main>
            </div>
        </div>

        <!-- Modal: Generate -->
        <div id="modal-generate" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50">
            <div class="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-md p-6 shadow-2xl relative transform transition-all scale-100 opacity-100">
                <h2 class="text-xl font-bold mb-5 text-gray-50 flex items-center gap-2">
                    <i data-lucide="zap" class="w-5 h-5 text-amber-500"></i> Generate
                </h2>
                <div class="space-y-5">
                    <div class="flex gap-2 p-1 bg-gray-950 rounded-lg border border-gray-800">
                        <button id="gen-type-password" class="flex-1 py-2 bg-gray-800 rounded-md text-sm font-medium text-gray-100 shadow-sm transition-all">Password</button>
                        <button id="gen-type-passphrase" class="flex-1 py-2 hover:bg-gray-800/50 rounded-md text-sm font-medium text-gray-400 transition-all">Passphrase</button>
                    </div>
                    <div id="gen-password-opts" class="space-y-4">
                        <label class="flex items-center justify-between text-sm">
                            <span class="font-medium text-gray-300">Length</span>
                            <input type="number" id="gen-length" value="20" min="8" max="128" class="w-24 px-3 py-1.5 bg-gray-950 border border-gray-700 rounded-lg text-sm focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 outline-none text-right transition-all">
                        </label>
                    </div>
                    <div id="gen-passphrase-opts" class="space-y-4 hidden">
                        <label class="flex items-center justify-between text-sm">
                            <span class="font-medium text-gray-300">Words</span>
                            <input type="number" id="gen-words" value="6" min="3" max="12" class="w-24 px-3 py-1.5 bg-gray-950 border border-gray-700 rounded-lg text-sm focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 outline-none text-right transition-all">
                        </label>
                        <label class="flex items-center justify-between text-sm">
                            <span class="font-medium text-gray-300">Separator</span>
                            <input type="text" id="gen-separator" value=" " class="w-24 px-3 py-1.5 bg-gray-950 border border-gray-700 rounded-lg text-sm focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 outline-none text-center transition-all font-mono">
                        </label>
                        <label class="flex items-center gap-3 text-sm cursor-pointer group">
                            <div class="relative flex items-center">
                                <input type="checkbox" id="gen-capitalize" checked class="sr-only peer">
                                <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-amber-600 transition-colors"></div>
                                <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full peer-checked:translate-x-5 transition-transform"></div>
                            </div>
                            <span class="font-medium text-gray-300 group-hover:text-gray-100 transition-colors">Capitalize</span>
                        </label>
                        <label class="flex items-center gap-3 text-sm cursor-pointer group">
                            <div class="relative flex items-center">
                                <input type="checkbox" id="gen-number" class="sr-only peer">
                                <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-amber-600 transition-colors"></div>
                                <div class="absolute left-1 top-1 w-3 h-3 bg-white rounded-full peer-checked:translate-x-5 transition-transform"></div>
                            </div>
                            <span class="font-medium text-gray-300 group-hover:text-gray-100 transition-colors">Add number</span>
                        </label>
                    </div>
                    
                    <div class="bg-gray-950 p-4 rounded-xl border border-gray-800 font-mono text-base break-all text-amber-400 text-center shadow-inner relative group" id="gen-result-container">
                        <span id="gen-result">—</span>
                    </div>
                    
                    <div class="flex gap-3 pt-2">
                        <button id="gen-refresh" class="flex-1 py-2.5 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm font-medium transition-colors flex items-center justify-center gap-2 outline-none focus:ring-2 focus:ring-gray-600 border border-gray-700">
                            <i data-lucide="refresh-cw" class="w-4 h-4 text-gray-400"></i> Regenerate
                        </button>
                        <button id="gen-copy" class="flex-1 py-2.5 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 rounded-xl text-sm font-semibold text-gray-50 transition-colors flex items-center justify-center gap-2 outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2 focus:ring-offset-gray-900 shadow-md shadow-amber-600/20">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copy
                        </button>
                    </div>
                </div>
                <button id="gen-close" class="absolute top-4 right-4 p-2 text-gray-500 hover:text-gray-200 hover:bg-gray-800 rounded-lg transition-colors outline-none focus:ring-2 focus:ring-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
        </div>

        <!-- Modal: Add/Edit Entry -->
        <div id="modal-entry" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50">
            <div class="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg p-6 shadow-2xl relative">
                <h2 id="modal-entry-title" class="text-xl font-bold mb-5 text-gray-50 flex items-center gap-2">
                    <i data-lucide="file-plus" class="w-5 h-5 text-amber-500" id="modal-entry-icon"></i> 
                    <span>New Entry</span>
                </h2>
                <form id="entry-form" class="space-y-4">
                    <input type="hidden" id="entry-id">
                    
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500 group-focus-within:text-amber-500 transition-colors">
                            <i data-lucide="layout-grid" class="w-4 h-4"></i>
                        </div>
                        <select id="entry-type" class="w-full pl-10 pr-10 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 appearance-none font-medium transition-colors">
                            <option value="login">Login</option>
                            <option value="note">Secure Note</option>
                            <option value="authenticator">Authenticator</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-500">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </div>
                    </div>

                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500 group-focus-within:text-amber-500 transition-colors">
                            <i data-lucide="type" class="w-4 h-4"></i>
                        </div>
                        <input type="text" id="entry-title" placeholder="Title" class="w-full pl-10 pr-4 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 font-medium transition-colors" required>
                    </div>

                    <div id="login-fields" class="space-y-4">
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500 group-focus-within:text-amber-500 transition-colors">
                                <i data-lucide="user" class="w-4 h-4"></i>
                            </div>
                            <input type="text" id="entry-username" placeholder="Username / Email" class="w-full pl-10 pr-4 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 font-medium transition-colors">
                        </div>
                        
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500 group-focus-within:text-amber-500 transition-colors">
                                <i data-lucide="key-round" class="w-4 h-4"></i>
                            </div>
                            <input type="text" id="entry-password" placeholder="Password" class="w-full pl-10 pr-4 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 font-medium font-mono transition-colors">
                        </div>

                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500 group-focus-within:text-amber-500 transition-colors">
                                <i data-lucide="link" class="w-4 h-4"></i>
                            </div>
                            <input type="url" id="entry-url" placeholder="Website URL (https://...)" class="w-full pl-10 pr-4 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 font-medium transition-colors">
                        </div>
                    </div>
                    <div class="border border-gray-800 bg-gray-900/40 rounded-xl p-4 mt-2">
                        <div class="flex items-center gap-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">
                            <i data-lucide="scan-line" class="w-4 h-4 text-amber-500"></i> Two-Factor Authentication
                        </div>
                        <div class="relative group">
                            <input type="text" id="entry-totp" placeholder="TOTP Secret (Base32, e.g. JBSWY3DPEHPK3PXP)" class="w-full px-4 py-2.5 bg-gray-950 border border-gray-700 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 font-medium font-mono transition-colors">
                        </div>
                        <p class="text-xs text-gray-500 mt-2">Optional: Add a 2FA secret to generate one-time passwords automatically.</p>
                    </div>
                    <div class="relative group">
                        <div class="absolute top-3 left-3 pointer-events-none text-gray-500 group-focus-within:text-amber-500 transition-colors">
                            <i data-lucide="align-left" class="w-4 h-4"></i>
                        </div>
                        <textarea id="entry-notes" placeholder="Secure Notes" rows="3" class="w-full pl-10 pr-4 py-2.5 bg-gray-950 border border-gray-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 font-medium transition-colors resize-y"></textarea>
                    </div>

                    <div class="flex gap-3 pt-3 mt-4 border-t border-gray-800">
                        <button type="button" id="entry-cancel" class="flex-1 py-2.5 bg-gray-800 hover:bg-gray-700 rounded-xl text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-gray-600 border border-gray-700">Cancel</button>
                        <button type="submit" class="flex-1 py-2.5 bg-amber-600 hover:bg-amber-500 active:bg-amber-700 rounded-xl text-sm font-semibold text-gray-50 transition-colors shadow-md shadow-amber-600/20 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2 focus:ring-offset-gray-900 flex justify-center items-center gap-2">
                            <i data-lucide="save" class="w-4 h-4"></i> Save Entry
                        </button>
                    </div>
                </form>
                <button id="entry-modal-close" class="absolute top-4 right-4 p-2 text-gray-500 hover:text-gray-200 hover:bg-gray-800 rounded-lg transition-colors outline-none focus:ring-2 focus:ring-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
        </div>
    </div>

    <script>
    // ── State ──────────────────────────────────────────────────────
    let entries = [];
    let selectedId = null;
    let ws = null;
    let genType = 'password';
    let activeTab = 'vault';

    // ── Icons Init ─────────────────────────────────────────────────
    function renderIcons() {
        if (window.lucide) {
            lucide.createIcons();
        }
    }
    
    // Call once on load
    document.addEventListener('DOMContentLoaded', renderIcons);

    // ── Toasts ─────────────────────────────────────────────────────
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        
        const icon = type === 'success' ? 'check-circle-2' : type === 'error' ? 'alert-circle' : 'info';
        const colorClass = type === 'success' ? 'text-green-400' : type === 'error' ? 'text-red-400' : 'text-amber-400';
        const borderClass = type === 'success' ? 'border-green-500/20' : type === 'error' ? 'border-red-500/20' : 'border-amber-500/20';
        const bgClass = type === 'success' ? 'bg-green-500/10' : type === 'error' ? 'bg-red-500/10' : 'bg-amber-500/10';
        
        toast.className = `toast-enter flex items-center gap-3 px-4 py-3 bg-gray-900 border ${borderClass} rounded-xl shadow-lg shadow-black/50 backdrop-blur-md`;
        
        toast.innerHTML = `
            <div class="flex-shrink-0 w-8 h-8 rounded-full ${bgClass} flex items-center justify-center ${colorClass}">
                <i data-lucide="${icon}" class="w-5 h-5"></i>
            </div>
            <p class="text-sm font-medium text-gray-100">${esc(message)}</p>
        `;
        
        container.appendChild(toast);
        renderIcons(); // Render the new icon
        
        setTimeout(() => {
            toast.classList.replace('toast-enter', 'toast-leave');
            setTimeout(() => toast.remove(), 300); // Remove after animation
        }, 3000);
    }

    // ── API helpers ────────────────────────────────────────────────
    const api = {
        async get(url) {
            const r = await fetch(url);
            return r.json();
        },
        async post(url, body) {
            const r = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return r.json();
        },
        async put(url, body) {
            const r = await fetch(url, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return r.json();
        },
        async del(url) {
            const r = await fetch(url, { method: 'DELETE' });
            return r.json();
        }
    };

    // ── WebSocket ──────────────────────────────────────────────────
    function connectWs() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/ws`);
        ws.onmessage = (e) => {
            if (e.data === 'unlock') {
                loadEntries();
                showMain();
            } else if (e.data === 'lock') {
                showLock();
            } else if (e.data === 'entries_changed') {
                loadEntries();
            }
        };
        ws.onclose = () => setTimeout(connectWs, 2000);
    }

    // ── UI state ───────────────────────────────────────────────────
    function showLock() {
        document.getElementById('lock-screen').classList.remove('hidden');
        document.getElementById('lock-screen').classList.add('flex');
        document.getElementById('main-ui').classList.add('hidden');
        document.getElementById('unlock-password').value = '';
        document.getElementById('unlock-error').classList.add('hidden');
        entries = [];
        selectedId = null;
        stopTotpAutoRefresh();
        renderList();
    }

    function showMain() {
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('lock-screen').classList.remove('flex');
        document.getElementById('main-ui').classList.remove('hidden');
    }

    // Escaper
    function esc(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ── Entries ────────────────────────────────────────────────────
    async function loadEntries() {
        const res = await api.get('/api/entries');
        if (res.ok) {
            entries = res.data;
            document.getElementById('entry-count').textContent = entries.length;
            renderList(document.getElementById('search-input').value);
            
            // Re-render currently selected entry if it exists to update UI
            if (selectedId && entries.find(e => e.id === selectedId)) {
                selectEntry(selectedId, true);
            }
        }
    }

    function renderList(filter = '') {
        const list = document.getElementById('entry-list');
        const q = filter.toLowerCase();
        let filtered = entries.filter(e =>
            e.title.toLowerCase().includes(q) ||
            (e.username && e.username.toLowerCase().includes(q)) ||
            (e.url && e.url.toLowerCase().includes(q))
        );
        
        if (activeTab === 'authenticator') {
            filtered = filtered.filter(e => e.entry_type === 'authenticator');
        } else {
            filtered = filtered.filter(e => e.entry_type !== 'authenticator');
        }

        list.innerHTML = filtered.map(e => {
            const iconMap = { login: 'key', note: 'file-text', card: 'credit-card', identity: 'user', authenticator: 'scan-line' };
            const iconName = iconMap[e.entry_type] || 'key';
            const isSelected = e.id === selectedId;
            
            const bgClass = isSelected ? 'bg-amber-500/10 border-amber-500/50' : 'bg-gray-900 border-gray-800 hover:border-gray-700 hover:bg-gray-800/50';
            const iconColor = isSelected ? 'text-amber-500' : 'text-gray-400';
            const titleColor = isSelected ? 'text-amber-500 font-semibold' : 'text-gray-200 font-medium';
            
            return `
                <div class="entry-item p-3.5 rounded-xl border transition-all cursor-pointer ${bgClass} group" data-id="${e.id}">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center bg-gray-950 border border-gray-800 group-hover:border-gray-700 transition-colors">
                            <i data-lucide="${iconName}" class="w-4 h-4 ${iconColor}"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm truncate ${titleColor}">${esc(e.title)}</div>
                            ${e.username ? `<div class="text-xs text-gray-500 truncate mt-0.5">${esc(e.username)}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        list.querySelectorAll('.entry-item').forEach(el => {
            el.onclick = () => selectEntry(el.dataset.id);
        });
        
        renderIcons();
    }

    async function selectEntry(id, skipRenderList = false) {
        selectedId = id;
        stopTotpAutoRefresh();
        
        if (!skipRenderList) {
            renderList(document.getElementById('search-input').value);
        }
        
        const res = await api.get(`/api/entries/${id}`);
        if (!res.ok) return;
        const e = res.data;
        const area = document.getElementById('content-area');
        const typeLabel = { login: 'Login', note: 'Secure Note', card: 'Payment Card', identity: 'Identity', authenticator: 'Authenticator' }[e.entry_type] || 'Entry';
        const typeIcon = { login: 'key', note: 'file-text', card: 'credit-card', identity: 'user', authenticator: 'scan-line' }[e.entry_type] || 'key';

        let html = `
            <div class="max-w-2xl mx-auto pb-10">
                <div class="flex items-start justify-between mb-8 pb-6 border-b border-gray-800">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-800 text-gray-400">
                            <i data-lucide="${typeIcon}" class="w-7 h-7"></i>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-50 tracking-tight">${esc(e.title)}</h2>
                            <span class="text-sm font-medium text-amber-500/80 bg-amber-500/10 px-2.5 py-0.5 rounded-full inline-block mt-2 border border-amber-500/20">${typeLabel}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editEntry('${e.id}')" class="px-4 py-2 bg-gray-900 hover:bg-gray-800 border border-gray-800 hover:border-gray-700 rounded-xl text-sm font-medium transition-all flex items-center gap-2 text-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-700">
                            <i data-lucide="edit-2" class="w-4 h-4"></i> Edit
                        </button>
                        <button onclick="deleteEntry('${e.id}')" class="px-4 py-2 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 hover:border-red-500/30 rounded-xl text-sm font-medium text-red-400 hover:text-red-300 transition-all flex items-center gap-2 focus:outline-none focus:ring-2 focus:ring-red-500/50">
                            <i data-lucide="trash-2" class="w-4 h-4"></i> Delete
                        </button>
                    </div>
                </div>
                
                <div class="space-y-4">
        `;

        if (e.username) {
            html += fieldRow('Username / Email', e.username, 'user', e.username);
        }
        if (e.password) {
            html += fieldRow('Password', '••••••••••••••••', 'key-round', e.password, false, true);
        }
        if (e.url) {
            html += fieldRow('Website URL', e.url, 'link', e.url, true);
        }
        
        if (e.totp_secret) {
            html += `
                <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-5 relative overflow-hidden group" id="totp-container">
                    <div class="absolute top-0 left-0 w-1 h-full bg-amber-500 rounded-l-2xl opacity-50"></div>
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i data-lucide="scan-line" class="w-4 h-4 text-amber-500"></i> Authenticator Code
                    </div>
                    <div class="flex items-center gap-5">
                        <div class="relative">
                            <svg class="totp-ring" width="56" height="56" viewBox="0 0 56 56">
                                <circle cx="28" cy="28" r="24" fill="none" stroke="#1f2937" stroke-width="4"/>
                                <circle class="progress" id="totp-ring-progress" cx="28" cy="28" r="24" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"
                                    stroke-dasharray="150.79" stroke-dashoffset="0"/>
                            </svg>
                            <div class="absolute inset-0 flex items-center justify-center font-bold text-xs text-gray-400" id="totp-remaining">--</div>
                        </div>
                        <div class="flex-1">
                            <div id="totp-code" class="text-4xl font-mono font-bold text-gray-100 tracking-[0.2em] filter drop-shadow-md cursor-pointer hover:text-amber-400 transition-colors" onclick="copyTotpCode()">------</div>
                        </div>
                        <button onclick="copyTotpCode()" class="flex items-center justify-center w-10 h-10 bg-gray-800 hover:bg-amber-600 hover:text-white rounded-xl transition-all text-gray-400 border border-gray-700 group-hover:border-gray-600 focus:outline-none focus:ring-2 focus:ring-amber-500 shadow-sm" title="Copy code">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;
            startTotpAutoRefresh(e.id);
        }

        if (e.notes) {
            html += `
                <div class="bg-gray-900/50 border border-gray-800 rounded-2xl p-5">
                    <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                        <i data-lucide="align-left" class="w-4 h-4"></i> Secure Notes
                    </div>
                    <div class="text-sm text-gray-300 font-mono whitespace-pre-wrap leading-relaxed overflow-x-auto">${esc(e.notes)}</div>
                </div>
            `;
        }

        html += `
                </div>
                <div class="mt-10 pt-6 border-t border-gray-800/50 text-xs font-medium text-gray-600 flex justify-between items-center bg-gray-950 rounded-xl px-4 py-3">
                    <div class="flex items-center gap-2"><i data-lucide="clock" class="w-3.5 h-3.5"></i> Created: ${new Date(e.created).toLocaleString()}</div>
                    <div class="flex items-center gap-2"><i data-lucide="history" class="w-3.5 h-3.5"></i> Modified: ${new Date(e.modified).toLocaleString()}</div>
                </div>
            </div>`;

        area.innerHTML = html;
        renderIcons();
    }

    function fieldRow(label, display, icon, copyVal, isLink = false, isPassword = false) {
        const copyBtn = copyVal
            ? `<button onclick="copyText('${esc(copyVal)}', '${esc(label)}') " class="flex-shrink-0 w-9 h-9 flex items-center justify-center bg-gray-800 hover:bg-amber-600 hover:text-white hover:border-amber-500 text-gray-400 rounded-lg transition-all border border-gray-700 focus:outline-none focus:ring-2 focus:ring-amber-500" title="Copy ${label}">
                 <i data-lucide="copy" class="w-4 h-4"></i>
               </button>`
            : '';
            
        const val = isLink
            ? `<a href="${esc(display)}" target="_blank" class="text-amber-400 hover:text-amber-300 hover:underline flex items-center gap-1"><i data-lucide="external-link" class="w-3.5 h-3.5"></i> ${esc(display)}</a>`
            : `<span class="text-base text-gray-200 font-medium ${isPassword ? 'font-mono tracking-widest text-lg translate-y-[2px]' : ''}">${display}</span>`;
            
        return `
            <div class="group flex items-center justify-between bg-gray-900/50 hover:bg-gray-900 border border-gray-800 hover:border-gray-700 p-4 rounded-2xl transition-all shadow-sm">
                <div class="flex items-center gap-4 flex-1 min-w-0">
                    <div class="w-10 h-10 rounded-xl bg-gray-950 flex items-center justify-center border border-gray-800 text-gray-500 group-hover:text-amber-500 transition-colors shadow-inner">
                        <i data-lucide="${icon}" class="w-5 h-5"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">${label}</div>
                        <div class="truncate">${val}</div>
                    </div>
                </div>
                <div class="pl-4 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity flex items-center gap-2">
                    ${copyBtn}
                </div>
            </div>
        `;
    }

    async function refreshTotp(id) {
        const res = await api.get(`/api/entries/${id}/totp`);
        if (res.ok) {
            const codeEl = document.getElementById('totp-code');
            const remainEl = document.getElementById('totp-remaining');
            const ringEl = document.getElementById('totp-ring-progress');
            const container = document.getElementById('totp-container');
            
            if (codeEl) {
                const code = res.data.code;
                codeEl.textContent = code.slice(0, 3) + ' ' + code.slice(3);
            }
            if (remainEl) {
                const remaining = parseInt(res.data.remaining);
                remainEl.textContent = remaining;
                if (container) {
                    if (remaining <= 5) {
                        container.classList.add('totp-urgent');
                        container.querySelector('.absolute.bg-amber-500').classList.replace('bg-amber-500', 'bg-red-500');
                    } else {
                        container.classList.remove('totp-urgent');
                        container.querySelector('.absolute').classList.replace('bg-red-500', 'bg-amber-500');
                    }
                }
            }
            if (ringEl) {
                const remaining = parseInt(res.data.remaining);
                const circumference = 150.79; // 2 * PI * 24
                const fraction = remaining / 30;
                ringEl.style.strokeDashoffset = circumference * (1 - fraction);
                if (remaining <= 5) {
                    ringEl.setAttribute('stroke', '#ef4444');
                } else if (remaining <= 10) {
                    ringEl.setAttribute('stroke', '#f97316');
                } else {
                    ringEl.setAttribute('stroke', '#f59e0b');
                }
            }
        }
    }

    async function copyText(text, label = "Item") {
        await navigator.clipboard.writeText(text);
        showToast(`${label} copied to clipboard`);
    }

    // ── TOTP auto-refresh ─────────────────────────────────────────
    let totpInterval = null;
    let currentTotpEntryId = null;

    function stopTotpAutoRefresh() {
        if (totpInterval) {
            clearInterval(totpInterval);
            totpInterval = null;
        }
        currentTotpEntryId = null;
    }

    function startTotpAutoRefresh(entryId) {
        stopTotpAutoRefresh();
        currentTotpEntryId = entryId;
        refreshTotp(entryId);
        totpInterval = setInterval(() => refreshTotp(entryId), 1000);
    }

    async function copyTotpCode() {
        const codeEl = document.getElementById('totp-code');
        if (codeEl && codeEl.textContent !== '------') {
            await copyText(codeEl.textContent.replace(' ', ''), 'Authenticator code');
        }
    }

    // ── Modals ─────────────────────────────────────────────────────
    function showModal(id) {
        document.getElementById(id).classList.remove('hidden');
        document.getElementById(id).classList.add('flex');
        
        // Small delay to allow display block to apply before animating opacity/transform
        setTimeout(() => {
            const inner = document.getElementById(id).querySelector('div');
            if(inner) {
                inner.classList.remove('scale-95', 'opacity-0');
                inner.classList.add('scale-100', 'opacity-100');
            }
        }, 10);
    }
    
    function hideModal(id) {
        const modal = document.getElementById(id);
        const inner = modal.querySelector('div');
        
        if(inner) {
            inner.classList.remove('scale-100', 'opacity-100');
            inner.classList.add('scale-95', 'opacity-0');
        }
        
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }, 200); // Wait for transition
    }

    // ── Event listeners ────────────────────────────────────────────
    document.getElementById('unlock-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.querySelector('#unlock-form button[type="submit"]');
        const ogContent = btn.innerHTML;
        
        btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Unlocking...';
        btn.disabled = true;
        renderIcons();
        
        const pw = document.getElementById('unlock-password').value;
        const errEl = document.getElementById('unlock-error');
        
        try {
            const res = await api.post('/api/unlock', { password: pw });
            if (res.ok) {
                showMain();
                await loadEntries();
                showToast('Vault unlocked successfully');
            } else {
                errEl.innerHTML = `<i data-lucide="alert-triangle" class="w-4 h-4 inline mr-1"></i> ${esc(res.error || 'Failed to unlock')}`;
                errEl.classList.remove('hidden');
                renderIcons();
            }
        } finally {
            btn.innerHTML = ogContent;
            btn.disabled = false;
            renderIcons();
        }
    };

    document.getElementById('btn-lock').onclick = async () => {
        await api.post('/api/lock');
        showLock();
        showToast('Vault locked', 'info');
    };

    document.getElementById('search-input').oninput = (e) => {
        renderList(e.target.value);
    };

    document.getElementById('btn-generate').onclick = () => {
        genType = 'password';
        updateGenType();
        generatePassword();
        showModal('modal-generate');
    };

    document.getElementById('gen-type-password').onclick = () => { genType = 'password'; updateGenType(); generatePassword(); };
    document.getElementById('gen-type-passphrase').onclick = () => { genType = 'passphrase'; updateGenType(); generatePassword(); };
    document.getElementById('gen-refresh').onclick = generatePassword;
    document.getElementById('gen-close').onclick = () => hideModal('modal-generate');
    document.getElementById('gen-copy').onclick = async () => {
        const text = document.getElementById('gen-result').textContent;
        if (text !== '—') await copyText(text, 'Generated password');
        hideModal('modal-generate');
    };

    function updateGenType() {
        const btnPass = document.getElementById('gen-type-password');
        const btnPhrase = document.getElementById('gen-type-passphrase');
        
        if (genType === 'password') {
            btnPass.className = "flex-1 py-2 bg-gray-800 rounded-md text-sm font-medium text-gray-100 shadow-sm transition-all";
            btnPhrase.className = "flex-1 py-2 hover:bg-gray-800/50 rounded-md text-sm font-medium text-gray-400 transition-all";
        } else {
            btnPhrase.className = "flex-1 py-2 bg-gray-800 rounded-md text-sm font-medium text-gray-100 shadow-sm transition-all";
            btnPass.className = "flex-1 py-2 hover:bg-gray-800/50 rounded-md text-sm font-medium text-gray-400 transition-all";
        }
        
        document.getElementById('gen-password-opts').classList.toggle('hidden', genType !== 'password');
        document.getElementById('gen-passphrase-opts').classList.toggle('hidden', genType !== 'passphrase');
    }

    async function generatePassword() {
        const body = genType === 'passphrase'
            ? { passphrase: true, words: +document.getElementById('gen-words').value, separator: document.getElementById('gen-separator').value, capitalize: document.getElementById('gen-capitalize').checked, number: document.getElementById('gen-number').checked }
            : { passphrase: false, length: +document.getElementById('gen-length').value };
            
        const res = await api.post('/api/generate', body);
        if (res.ok) {
            const container = document.getElementById('gen-result');
            container.textContent = res.data.password;
            
            // Small pop animation
            container.parentElement.classList.remove('scale-105', 'shadow-amber-500/20');
            void container.parentElement.offsetWidth; // trigger reflow
            container.parentElement.classList.add('scale-105', 'shadow-amber-500/20');
            setTimeout(() => container.parentElement.classList.remove('scale-105', 'shadow-amber-500/20'), 200);
        }
    }
    // Initialize toggle classes for modal inner divs for transitions
    document.querySelectorAll('[id^="modal-"] > div').forEach(div => {
        div.classList.add('scale-95', 'opacity-0');
    });

    document.getElementById('tab-vault').onclick = () => {
        activeTab = 'vault';
        document.getElementById('tab-vault').className = "flex-1 py-1.5 px-3 rounded-lg text-sm font-medium bg-gray-800 text-gray-200 transition-all";
        document.getElementById('tab-authenticator').className = "flex-1 py-1.5 px-3 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-gray-800/50 transition-all";
        renderList(document.getElementById('search-input').value);
    };

    document.getElementById('tab-authenticator').onclick = () => {
        activeTab = 'authenticator';
        document.getElementById('tab-authenticator').className = "flex-1 py-1.5 px-3 rounded-lg text-sm font-medium bg-gray-800 text-gray-200 transition-all";
        document.getElementById('tab-vault').className = "flex-1 py-1.5 px-3 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-300 hover:bg-gray-800/50 transition-all";
        renderList(document.getElementById('search-input').value);
    };

    // ── Entry CRUD modals ──────────────────────────────────────────
    document.getElementById('btn-add').onclick = () => {
        document.getElementById('modal-entry-title').innerHTML = '<i data-lucide="file-plus" class="w-5 h-5 text-amber-500"></i> <span>New Entry</span>';
        document.getElementById('entry-id').value = '';
        document.getElementById('entry-form').reset();
        document.getElementById('entry-type').value = activeTab === 'authenticator' ? 'authenticator' : 'login';
        document.getElementById('entry-totp').value = '';
        updateEntryTypeFields();
        renderIcons();
        showModal('modal-entry');
    };

    document.getElementById('entry-type').onchange = updateEntryTypeFields;
    document.getElementById('entry-cancel').onclick = () => hideModal('modal-entry');
    document.getElementById('entry-modal-close').onclick = () => hideModal('modal-entry');

    function updateEntryTypeFields() {
        const type = document.getElementById('entry-type').value;
        const loginFields = document.getElementById('login-fields');
        
        if (type === 'note' || type === 'authenticator') {
            loginFields.style.display = 'none';
        } else {
            loginFields.style.display = 'block';
        }
    }

    document.getElementById('entry-form').onsubmit = async (e) => {
        e.preventDefault();
        
        // Show loading state
        const btn = document.querySelector('#entry-form button[type="submit"]');
        const ogContent = btn.innerHTML;
        btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Saving...';
        btn.disabled = true;
        renderIcons();
        
        try {
            const id = document.getElementById('entry-id').value;
            const body = {
                title: document.getElementById('entry-title').value,
                username: document.getElementById('entry-username').value,
                password: document.getElementById('entry-password').value,
                url: document.getElementById('entry-url').value,
                notes: document.getElementById('entry-notes').value,
                totp_secret: document.getElementById('entry-totp').value,
                entry_type: document.getElementById('entry-type').value,
            };

            if (id) {
                await api.put(`/api/entries/${id}`, body);
                showToast('Entry updated successfully');
            } else {
                const res = await api.post('/api/entries', body);
                showToast('New entry created');
                if (res.ok && res.data) {
                    idToSelect = res.data.id;
                }
            }
            
            hideModal('modal-entry');
            await loadEntries();
            
            if (id) {
                selectEntry(id);
            } else if (typeof idToSelect !== 'undefined') {
                selectEntry(idToSelect);
            }
        } catch (err) {
            showToast('Failed to save entry', 'error');
            console.error(err);
        } finally {
            btn.innerHTML = ogContent;
            btn.disabled = false;
            renderIcons();
        }
    };

    window.editEntry = async (id) => {
        const res = await api.get(`/api/entries/${id}`);
        if (!res.ok) return;
        const e = res.data;
        
        document.getElementById('modal-entry-title').innerHTML = '<i data-lucide="edit" class="w-5 h-5 text-amber-500"></i> <span>Edit Entry</span>';
        document.getElementById('entry-id').value = e.id;
        document.getElementById('entry-type').value = e.entry_type;
        document.getElementById('entry-title').value = e.title;
        document.getElementById('entry-username').value = e.username || '';
        document.getElementById('entry-password').value = e.password || '';
        document.getElementById('entry-url').value = e.url || '';
        document.getElementById('entry-notes').value = e.notes || '';
        document.getElementById('entry-totp').value = e.totp_secret || '';
        
        updateEntryTypeFields();
        renderIcons();
        showModal('modal-entry');
    };

    window.deleteEntry = async (id) => {
        if (!confirm('Are you sure you want to delete this entry? This cannot be undone.')) return;
        
        stopTotpAutoRefresh();
        const res = await api.del(`/api/entries/${id}`);
        
        if (res.ok) {
            selectedId = null;
            document.getElementById('content-area').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-gray-500 space-y-4 select-none">
                    <div class="w-20 h-20 bg-gray-900/50 rounded-3xl flex items-center justify-center border border-gray-800 shadow-inner">
                        <i data-lucide="box" class="w-10 h-10 text-gray-700"></i>
                    </div>
                    <p class="font-medium text-gray-500 text-sm">Select an entry or create a new one</p>
                </div>
            `;
            renderIcons();
            showToast('Entry deleted successfully');
            await loadEntries();
        } else {
            showToast('Failed to delete entry', 'error');
        }
    };

    window.copyText = copyText;
    window.refreshTotp = refreshTotp;
    window.copyTotpCode = copyTotpCode;

    // ── Init ───────────────────────────────────────────────────────
    connectWs();
    </script>
</body>
</html>
