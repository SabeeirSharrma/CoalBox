name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: coalbox-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            artifact: coalbox-aarch64-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          cp target/${{ matrix.target }}/release/coalbox ${{ matrix.artifact }}-cli
          cp target/${{ matrix.target }}/release/coalbox-web ${{ matrix.artifact }}-web
          chmod +x ${{ matrix.artifact }}-cli ${{ matrix.artifact }}-web

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}-cli
            ${{ matrix.artifact }}-web

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          for dir in coalbox-*/; do
            sha256sum "$dir"* > "${dir}sha256sums.txt"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Checksums Only

            > **⚠ Do not download or use the binary artifacts below.**
            > They are provided for SHA-256 checksum verification only.
            > Coalbox must be built from source. See [CONTRIBUTING.md](CONTRIBUTING.md) for build instructions.

            ${{ github.event.head_commit.message }}
          files: |
            coalbox-x86_64-linux/coalbox-x86_64-linux-cli
            coalbox-x86_64-linux/coalbox-x86_64-linux-web
            coalbox-x86_64-linux/sha256sums.txt
            coalbox-aarch64-linux/coalbox-aarch64-linux-cli
            coalbox-aarch64-linux/coalbox-aarch64-linux-web
            coalbox-aarch64-linux/sha256sums.txt
